services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ericjohnson-app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: ericjohnson-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Optional future MongoDB service (disabled unless profile is enabled).
  # To use it later:
  # 1) Start compose with: docker compose --profile mongo up -d
  # 2) Set DATABASE_URL=mongodb://mongo:27017/ericjohnson
  mongo:
    image: mongo:7
    container_name: ericjohnson-mongo
    profiles: ["mongo"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
